version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# OnixFrame – Full Stack Docker Compose
#
# Services:
#   app          Next.js 15 (port 3000)
#   whisper      Python FastAPI + Whisper (port 8000 — internal only)
#   ollama       Ollama LLM (port 11434 — internal only)
#   ollama-init  One-shot: pulls llama3.2:3b after ollama is healthy
#   minio        S3-compatible object storage (port 9000 public, 9001 console)
#   minio-init   One-shot: creates the bucket on first run
#   postgres     Local PostgreSQL (dev only — use NeonDB in production/EC2)
#
# EC2 usage:
#   1. Copy .env.example → .env and fill in your values
#   2. Set DATABASE_URL to your NeonDB connection string
#   3. Set MINIO_PUBLIC_URL=http://<EC2_PUBLIC_IP>:9000
#   4. Remove the `postgres` service (use NeonDB instead)
#   5. docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Next.js Application ────────────────────────────────────────────────────
  app:
    build:
      context: ./onixframe
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Docker internal service names — NOT localhost
      DATABASE_URL:          ${DATABASE_URL:-postgresql://onixframe:onixframe@postgres:5432/onixframe}
      MINIO_ENDPOINT:        minio
      MINIO_PORT:            "9000"
      MINIO_ACCESS_KEY:      ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:      ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET:          ${MINIO_BUCKET:-onixframe-videos}
      MINIO_USE_SSL:         "false"
      MINIO_PUBLIC_URL:      ${MINIO_PUBLIC_URL:-http://localhost:9000}
      WHISPER_SERVICE_URL:   http://whisper:8000
      OLLAMA_URL:            http://ollama:11434
      OLLAMA_MODEL:          ${OLLAMA_MODEL:-llama3.2:3b}
      NEXT_PUBLIC_APP_URL:   ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL:-http://localhost:9000}
      EC2_PUBLIC_IP:         ${EC2_PUBLIC_IP:-}
      NODE_ENV:              production
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      whisper:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Python Whisper FastAPI Service ─────────────────────────────────────────
  whisper:
    build:
      context: ./whisper-service
      dockerfile: Dockerfile
    environment:
      MODEL_SIZE:      ${WHISPER_MODEL_SIZE:-base}
      MINIO_ENDPOINT:  minio
      MINIO_PORT:      "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET:    ${MINIO_BUCKET:-onixframe-videos}
      MINIO_USE_SSL:   "false"
    volumes:
      - whisper_models:/root/.cache/whisper
    # Ports NOT exposed publicly — only accessible from other containers
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      retries:  10
      start_period: 90s   # Whisper downloads model on first run
    restart: unless-stopped

  # ── Ollama LLM Service ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout:  10s
      retries:  10
      start_period: 60s
    restart: unless-stopped

  # ── Ollama model pull (one-shot on first boot) ─────────────────────────────
  # Pulls llama3.2:3b once; model is cached in the ollama_data volume.
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Pulling llama3.2:3b...';
        curl -X POST http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d '{\"name\": \"llama3.2:3b\"}';
        echo 'Pull complete.'
      "
    restart: "no"

  # ── MinIO Object Storage ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API — must be public for presigned URL browser access
      - "9001:9001"   # Console — expose only to your IP in production
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s
    restart: unless-stopped

  # ── MinIO bucket initialisation (one-shot) ─────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123};
        mc mb local/${MINIO_BUCKET:-onixframe-videos} --ignore-existing;
        mc anonymous set download local/${MINIO_BUCKET:-onixframe-videos};
        echo 'MinIO bucket ready.';
      "
    restart: "no"

  # ── PostgreSQL (local dev only — replace with NeonDB on EC2) ───────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     onixframe
      POSTGRES_PASSWORD: onixframe
      POSTGRES_DB:       onixframe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Only for local dev access; close on EC2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onixframe"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    restart: unless-stopped

# ── Named volumes (persisted across restarts) ──────────────────────────────
volumes:
  postgres_data:
  minio_data:
  whisper_models:
  ollama_data:
