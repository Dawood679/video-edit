# ── Development overrides ──────────────────────────────────────────────────
# Auto-loaded by `docker compose up` (local dev only).
# EC2 / Production: docker compose -f docker-compose.yml up -d

version: "3.9"

services:
  app:
    command: sh -c "npx prisma migrate deploy && npm run dev"
    environment:
      NODE_ENV: development
    volumes:
      - ./onixframe/src:/app/src
      - ./onixframe/prisma:/app/prisma
      - ./onixframe/public:/app/public
      - /app/node_modules
      - /app/.next

  # Expose internal ports for debugging locally
  whisper:
    ports:
      - "8000:8000"

  ollama:
    ports:
      - "11434:11434"

volumes:
  minio_data:
  whisper_models:
  ollama_data:
